name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Trigger deployment when you push to 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # 3️⃣ Deploy to S3
      - name: Deploy to S3
        run: |
          # Only sync necessary files, exclude .github folder
          aws s3 sync ./ s3://shariqua-portfolio \
            --delete \
            --exclude ".github/*" \
            --acl public-read
