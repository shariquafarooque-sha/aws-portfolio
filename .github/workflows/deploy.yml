name: Deploy Portfolio 

on:
  push:
    branches:
      - main  # Trigger deployment when you push to 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}        # Set in GitHub Secrets
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Set in GitHub Secrets
          aws-region: eu-west-2  # Your bucket region (London)

      - name: Deploy to S3
        run: |
          aws s3 sync ./ s3://shariqua-portfolio --delete
          aws s3 cp ./index.html s3://shariqua-portfolio/index.html --acl public-read
